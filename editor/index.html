<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basic Writing Editor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #editor {
      width: 100%;
      height: 400px;
      padding: 15px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: none;
      outline: none;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📝 Basic Writing Editor</h1>

  <textarea id="editor" placeholder="Start typing here..."></textarea>

  <br>

  <button onclick="saveText()">Save</button>
</div>

<script>
  function saveText() {
    const text = document.getElementById("editor").value;
    localStorage.setItem("savedText", text);
    alert("Text saved!");
  }

  // Load saved text
  window.onload = function () {
    const saved = localStorage.getItem("savedText");
    if (saved) {
      document.getElementById("editor").value = saved;
    }
  };
</script>

</body>
</html>
